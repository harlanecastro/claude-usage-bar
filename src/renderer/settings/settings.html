<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'none'; style-src 'self'; script-src 'self'">
  <title>Settings</title>
  <link rel="stylesheet" href="settings.css">
</head>
<body>
  <main class="page">

    <section class="field">
      <label class="field-label" for="lang" data-i18n="settings.language"></label>
      <p class="field-hint" data-i18n="settings.languageHint"></p>
      <select id="lang"></select>
    </section>

    <hr class="rule">

    <section class="field">
      <span class="field-label" data-i18n="settings.thresholds"></span>
      <p class="field-hint" data-i18n="settings.thresholdsHint"></p>

      <div class="zone-track" id="zoneTrack">
        <div class="zone-fill">
          <span class="z1" id="z1"></span>
          <span class="z2" id="z2"></span>
          <span class="z3" id="z3"></span>
        </div>
        <div class="bubble" id="b1"></div>
        <div class="bubble" id="b2"></div>
        <div class="handle" id="h1" role="slider" tabindex="0"
             aria-valuemin="5" aria-valuemax="90" aria-valuenow="60"></div>
        <div class="handle" id="h2" role="slider" tabindex="0"
             aria-valuemin="10" aria-valuemax="95" aria-valuenow="85"></div>
      </div>

      <div class="scale">
        <span>0%</span><span>25%</span><span>50%</span><span>75%</span><span>100%</span>
      </div>

      <div class="legend">
        <div>
          <span class="name"><i class="swatch ok"></i><b data-i18n="settings.green"></b></span>
          <span class="range" id="lg1"></span>
        </div>
        <div>
          <span class="name"><i class="swatch warn"></i><b data-i18n="settings.yellow"></b></span>
          <span class="range" id="lg2"></span>
        </div>
        <div>
          <span class="name"><i class="swatch crit"></i><b data-i18n="settings.red"></b></span>
          <span class="range" id="lg3"></span>
        </div>
      </div>
    </section>

    <hr class="rule">

    <section class="field">
      <span class="field-label" data-i18n="settings.meters"></span>
      <!-- Text is chosen per platform — see renderMetersHint. -->
      <p class="field-hint" id="metersHint"></p>
      <div class="meters" id="meters" role="group"></div>
    </section>

    <hr class="rule">

    <!-- Only rendered when more than one monitor has a taskbar to live in. -->
    <section class="field" id="monitorField" hidden>
      <label class="field-label" for="monitor" data-i18n="settings.monitor"></label>
      <p class="field-hint" data-i18n="settings.monitorHint"></p>
      <select id="monitor"></select>
    </section>

    <!-- Windows only: macOS decides where a menu bar item sits, not the app. -->
    <section class="toggle-row" id="alignLeftField">
      <div class="txt">
        <span class="field-label" data-i18n="settings.alignLeft"></span>
        <p class="field-hint" data-i18n="settings.alignLeftHint"></p>
      </div>
      <button class="switch" id="alignLeft" role="switch" aria-checked="false"></button>
    </section>

    <section class="toggle-row">
      <div class="txt">
        <span class="field-label" data-i18n="settings.startAtLogin"></span>
        <p class="field-hint" data-i18n="settings.startAtLoginHint"></p>
      </div>
      <button class="switch" id="startAtLogin" role="switch" aria-checked="false"></button>
    </section>

    <hr class="rule">

    <section class="field">
      <span class="field-label" data-i18n="settings.consumptionRetention"></span>
      <p class="field-hint" data-i18n="settings.consumptionRetentionHint"></p>
      <div class="retention-grid">
        <label>
          <span data-i18n="settings.retentionDays"></span>
          <span class="number-input"><input id="retentionDays" type="number" min="7" max="365"><b data-i18n="settings.retentionDaysUnit"></b></span>
        </label>
        <label>
          <span data-i18n="settings.retentionSize"></span>
          <span class="number-input"><input id="retentionSize" type="number" min="25" max="1000"><b data-i18n="settings.retentionSizeUnit"></b></span>
        </label>
      </div>
    </section>

    <hr class="rule">

    <section class="field">
      <span class="field-label" data-i18n="settings.vps"></span>
      <p class="field-hint" data-i18n="settings.vpsHint"></p>
      <div class="retention-grid">
        <label>
          <span data-i18n="settings.vpsUrl"></span>
          <input id="vpsUrl" type="url" placeholder="https://cidade.express" autocomplete="off" spellcheck="false">
        </label>
        <label>
          <span data-i18n="settings.vpsToken"></span>
          <input id="vpsToken" type="password" autocomplete="off" spellcheck="false">
        </label>
      </div>
    </section>

    <hr class="rule">

    <section class="field">
      <span class="field-label" data-i18n="settings.account"></span>
      <div class="account">
        <span class="status" id="authStatus"></span>
        <button class="btn" id="authBtn"></button>
      </div>
    </section>

    <footer class="credit">
      <span data-i18n="settings.madeBy"></span>
      <b>Harlane Castro</b>
    </footer>

  </main>
  <script src="settings.js"></script>
</body>
</html>
